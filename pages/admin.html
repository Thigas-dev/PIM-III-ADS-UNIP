<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Unip</title>

    <!-- Padrão -->
    <link rel="icon" href="/img/icon/favicon.ico" type="image/x-icon">

    <!-- Ícone para dispositivos Apple -->
    <link rel="apple-touch-icon" href="/img/icon/apple-touch-icon.png">

    <!-- WEBP (navegadores modernos) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/img/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/icon/favicon-16x16.png">

    <link rel="manifest" href="/img/icon/site.webmanifest">

    <link rel="stylesheet" href="/styles/admin.css">
</head>

<body>
    <header>
        <nav class="">
            <a href="/pages/index.html" class="Logo">
                <img src="/img/logo/barbearia.png" alt="Logo" class="LogoImg">
                <li>Barber Unip</li>
            </a>
            <ul class="Links">
                <li>
                    <a href="#agendamentos">Agendamentos</a>
                </li>
                <li>
                    <a href="#servicos">Serviços</a>
                </li>
                <li>
                    <a href="/pages/index.html">Logout</a>
                </li>

            </ul>
        </nav>
    </header>
    <!-- Gerenciamento de Serviços (CRUD) -->
    <div class="container">
        <section id="gerenciar-servicos" class="secao-admin-bloco">
            <div class="titulo-tabela">
                <h2>Gerenciar Serviços e Preços</h2>
                <button class="btn-novo">+ Novo Serviço</button>
            </div>

            <div class="tabela-responsiva">
                <table class="tabela-admin">
                    <thead>
                        <tr>
                            <th>Serviço</th>
                            <th>Preço Atual (R$)</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" value="Corte de cabelo masculino" class="input-editavel"></td>
                            <td><input type="number" value="35.00" class="input-editavel" step="0.50"></td>
                            <td>
                                <button class="btn-acao btn-salvar">Salvar</button>
                                <button class="btn-acao btn-cancelar">Excluir</button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="text" value="Barba e bigode" class="input-editavel"></td>
                            <td><input type="number" value="25.00" class="input-editavel" step="0.50"></td>
                            <td>
                                <button class="btn-acao btn-salvar">Salvar</button>
                                <button class="btn-acao btn-cancelar">Excluir</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Barber Unip. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
